name: Kotlin Tests

on:
  # Always trigger so the test check reports on every push/PR (required-check
  # friendly). Path relevance is decided per-job below: when nothing relevant
  # changed, the test job is skipped, which counts as a passing required check.
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  changes:
    name: detect relevant changes
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.filter.outputs.run }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            run:
              - "core/**"
              - "android/sample/unifiedquery/**"
              - "android/sample/build.gradle.kts"
              - "android/sample/settings.gradle.kts"
              - "android/sample/gradle.properties"
              - "spec/**"
              - ".github/workflows/kotlin-tests.yml"

  kotlin-test:
    name: gradle :unifiedquery:test on macOS arm64
    needs: changes
    # workflow_dispatch has no diff to filter on, so always run when dispatched.
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.run == 'true' }}
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: core

      - name: Build Rust cdylib for macOS arm64
        working-directory: core
        # Produces libunfydqry.dylib that JNA can load.
        # build.gradle.kts passes target/aarch64-apple-darwin/release/ as jna.library.path.
        run: cargo build --release --target aarch64-apple-darwin

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Verify Kotlin binding is in sync with Rust
        # Verify that the committed Kotlin binding matches what would be regenerated
        # from the current Rust implementation (drift detection).
        # uniffi-bindgen invokes `cargo metadata` against cwd, so we run it inside core/.
        working-directory: core
        run: |
          set -eux
          cargo run --bin uniffi-bindgen -- generate \
            --library target/aarch64-apple-darwin/release/libunfydqry.dylib \
            --language kotlin \
            --out-dir generated/kotlin
          diff -u \
            ../android/sample/unifiedquery/src/main/kotlin/uniffi/unfydqry/unfydqry.kt \
            generated/kotlin/uniffi/unfydqry/unfydqry.kt

      - name: gradle :unifiedquery:test
        working-directory: android/sample
        run: gradle :unifiedquery:test --info

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kotlin-test-reports
          path: |
            android/sample/unifiedquery/build/reports/tests/test/
            android/sample/unifiedquery/build/test-results/test/
          if-no-files-found: ignore

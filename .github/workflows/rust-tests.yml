name: Rust Tests

on:
  # Always trigger so the test check reports on every push/PR (required-check
  # friendly). Path relevance is decided per-job below: when nothing relevant
  # changed, the test job is skipped, which counts as a passing required check.
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  changes:
    name: detect relevant changes
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.filter.outputs.run }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            run:
              - "core/**"
              - "spec/**"
              - ".github/workflows/rust-tests.yml"

  rust-test:
    name: cargo test on ubuntu-latest
    needs: changes
    # workflow_dispatch has no diff to filter on, so always run when dispatched.
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.run == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: core

      - name: cargo fmt --check
        working-directory: core
        run: cargo fmt --all -- --check

      - name: cargo clippy
        working-directory: core
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        working-directory: core
        run: cargo test --all-targets

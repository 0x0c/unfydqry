name: Flutter Tests

on:
  # Always trigger so the test check reports on every push/PR (required-check
  # friendly). Path relevance is decided per-job below: when nothing relevant
  # changed, the test job is skipped, which counts as a passing required check.
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  changes:
    name: detect relevant changes
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.filter.outputs.run }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            run:
              - "flutter/**"
              - ".github/workflows/flutter-tests.yml"

  dart-test:
    name: flutter test (Dart unit tests)
    needs: changes
    # workflow_dispatch has no diff to filter on, so always run when dispatched.
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.run == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: flutter pub get
        working-directory: flutter
        run: flutter pub get

      - name: flutter test
        working-directory: flutter
        run: flutter test --reporter expanded    # 13 cases (mock method channel)

      - name: Upload test output on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flutter-test-output
          path: flutter/build/
          if-no-files-found: ignore

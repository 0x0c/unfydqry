name: unfydqry
description: Flutter plugin for the unfydqry full-text search engine (Rust/UniFFI core).
version: 0.1.0
homepage: https://github.com/0x0c/unfydqry

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

flutter:
  plugin:
    platforms:
      android:
        package: unfydqry.flutter
        pluginClass: UnfydqryPlugin
      ios:
        pluginClass: UnfydqryPlugin

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
